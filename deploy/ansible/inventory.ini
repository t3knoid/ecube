# ECUBE target hosts.
# Replace the example IP / hostname with your VM's address.
# Add multiple hosts under [ecube_hosts] to deploy to several machines at once.

[ecube_hosts]
ecube-vm ansible_host=192.168.1.50 ansible_user=ubuntu

# Optional: override per-host variables inline
# ecube-vm ansible_host=192.168.1.50 ansible_user=ubuntu ecube_version=v1.2.0

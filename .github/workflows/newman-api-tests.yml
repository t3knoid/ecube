name: Newman API Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  newman:
    name: Newman (Postman Collection)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: ecube
          POSTGRES_PASSWORD: ecube
          POSTGRES_DB: ecube
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecube"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ecube:ecube@localhost/ecube
      SECRET_KEY: ci-test-secret-key-do-not-use-in-production
      ROLE_RESOLVER: local
      LOCAL_GROUP_ROLE_MAP: '{"evidence-admins": ["admin"], "evidence-team": ["processor", "auditor"]}'
      SESSION_BACKEND: cookie

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Generate admin JWT for Newman
        id: auth
        run: |
          TOKEN=$(python - <<'PY'
          import jwt, time
          payload = {
              'sub': 'ci-admin',
              'username': 'ci-admin',
              'groups': ['evidence-admins'],
              'roles': ['admin'],
              'exp': int(time.time()) + 3600,
          }
          print(jwt.encode(payload, 'ci-test-secret-key-do-not-use-in-production', algorithm='HS256'))
          PY
          )
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Start API server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            echo "Waiting for server… attempt $i/30"
            sleep 1
          done
          curl -sf http://localhost:8000/health || (echo "::error::Server failed to start within 30s" && exit 1)

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Newman collection
        run: |
          newman run postman/ecube-postman-collection.json \
            --env-var "base_url=http://localhost:8000" \
            --env-var "token=${{ steps.auth.outputs.token }}" \
            --folder "Health & Version" \
            --folder "Auth" \
            --folder "Database Setup" \
            --folder "Drives" \
            --folder "Mounts" \
            --folder "Jobs" \
            --folder "Files" \
            --folder "Introspection" \
            --folder "Audit" \
            --folder "Admin — Logs" \
            --folder "Admin — OS Users" \
            --folder "Admin — OS Groups" \
            --folder "Users (Role Management)" \
            --reporters cli,json,htmlextra \
            --reporter-json-export newman-report.json \
            --reporter-htmlextra-export newman-report.html \
            || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: |
            newman-report.json
            newman-report.html
          retention-days: 30

      - name: Newman pass/fail check
        run: |
          if [ ! -f newman-report.json ]; then
            echo "::error::Newman report not found — Newman may have crashed before writing output"
            exit 1
          fi
          python - <<'PY'
          import json, pathlib, sys
          r = json.loads(pathlib.Path('newman-report.json').read_text())
          stats = r.get('run', {}).get('stats', {})
          assertion_failures = stats.get('assertions', {}).get('failed', 0)
          request_failures = stats.get('requests', {}).get('failed', 0)
          print(f"Assertion failures: {assertion_failures}")
          print(f"Request failures:   {request_failures}")
          errors = []
          if assertion_failures > 0:
              errors.append(f"::error::Newman found {assertion_failures} failed assertion(s)")
          if request_failures > 0:
              errors.append(f"::error::Newman found {request_failures} failed request(s)")
          for e in errors:
              print(e)
          sys.exit(1 if errors else 0)
          PY

version: "3.9"

services:
  postgres-integration:
    image: postgres:16
    container_name: ecube-postgres-integration
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecube_integration
      POSTGRES_USER: ecube_test
      POSTGRES_PASSWORD: ecube_test
    ports:
      - "5433:5432"
    volumes:
      - ecube_postgres_integration_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecube_test -d ecube_integration"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ecube_postgres_integration_data:

name: Docker Build

# Builds the release-tagged application image, runs a smoke test against the
# full stack, then pushes the smoke-tested image to GHCR and attaches a
# production docker-compose.yml to the matching GitHub Release.
#
# This workflow runs only when the tag-release workflow creates a fresh tag and
# draft release, then explicitly dispatches this workflow with the tag and sha.

on:
  repository_dispatch:
    types: [docker-release-build]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.client_payload.tag || github.run_id }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/ecube-app

jobs:
  build-and-smoke-test:
    name: Build and smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SECRET_KEY: ci-smoke-test-key-not-for-production
      POSTGRES_PASSWORD: ci-smoke-test-postgres-password

    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha }}

      - name: Determine image tag
        id: tag
        run: |
          TAG='${{ github.event.client_payload.tag }}'
          if [[ -z "$TAG" || ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Expected a semantic version tag in repository_dispatch payload, got '$TAG'."
            exit 1
          fi
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build images
        run: docker compose -f docker-compose.ecube.yml build

      - name: Tag images for registry
        run: |
          docker tag ecube-app ${{ env.APP_IMAGE }}:${{ steps.tag.outputs.value }}

      - name: Save smoke-tested images as artifacts
        run: |
          mkdir -p /tmp/docker-images
          docker save "${{ env.APP_IMAGE }}:${{ steps.tag.outputs.value }}" \
            | gzip > /tmp/docker-images/ecube-app.tar.gz

      - name: Upload smoke-tested images
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/docker-images/
          retention-days: 1

      - name: Create .env for smoke test
        run: |
          printf 'SECRET_KEY=%s\nPOSTGRES_PASSWORD=%s\nPOSTGRES_USER=ecube\nPOSTGRES_DB=ecube\n' \
            "$SECRET_KEY" "$POSTGRES_PASSWORD" > .env

      - name: Start stack
        run: |
          docker compose -f docker-compose.ecube.yml up -d
          echo "Waiting for postgres to be healthy..."
          POSTGRES_READY=false
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ecube-postgres 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "postgres is healthy"
              POSTGRES_READY=true
              break
            fi
            echo "  attempt $i/30 — $STATUS"
            sleep 3
          done
          $POSTGRES_READY || { echo "::error::postgres never became healthy"; exit 1; }

      - name: Smoke test — API health check (via app container)
        run: |
          echo "Waiting for ecube-app to respond..."
          APP_READY=false
          for i in $(seq 1 20); do
            CODE=$(docker compose -f docker-compose.ecube.yml exec -T ecube-app \
              curl -skf -o /dev/null -w "%{http_code}" https://localhost:8443/api/health 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Health check passed (HTTP $CODE)"
              APP_READY=true
              break
            fi
            echo "  attempt $i/20 — HTTP $CODE"
            sleep 3
          done
          $APP_READY || { echo "::error::ecube-app health check never passed"; exit 1; }
          docker compose -f docker-compose.ecube.yml exec -T ecube-app \
            curl -skf https://localhost:8443/api/health | grep '"status"'

      - name: Smoke test — TLS health check (via host)
        run: |
          echo "Verifying TLS endpoint is reachable..."
          TLS_READY=false
          for i in $(seq 1 10); do
            CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost:8443/api/health 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "TLS health check passed (HTTP $CODE)"
              TLS_READY=true
              break
            fi
            echo "  attempt $i/10 — HTTP $CODE"
            sleep 2
          done
          $TLS_READY || { echo "::error::TLS health check never passed"; exit 1; }
          curl -sk https://localhost:8443/api/health | grep '"status"'

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.ecube.yml logs ecube-app   || true
          docker compose -f docker-compose.ecube.yml logs postgres     || true

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.ecube.yml down -v

  publish:
    name: Push images and publish release compose
    needs: build-and-smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download smoke-tested images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/docker-images

      - name: Load smoke-tested images
        # Pushes the exact linux/amd64 images that passed the smoke test — no rebuild.
        run: |
          docker load < /tmp/docker-images/ecube-app.tar.gz

      - name: Tag images with :latest
        run: |
          docker tag "${{ env.APP_IMAGE }}:${{ needs.build-and-smoke-test.outputs.tag }}" "${{ env.APP_IMAGE }}:latest"

      - name: Push ecube-app
        run: |
          docker push "${{ env.APP_IMAGE }}:${{ needs.build-and-smoke-test.outputs.tag }}"
          docker push "${{ env.APP_IMAGE }}:latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate production docker-compose
        run: |
          python3 -m pip install --quiet pyyaml
          mkdir -p dist
          TAG="${{ needs.build-and-smoke-test.outputs.tag }}"
          IMAGE="${{ env.APP_IMAGE }}:${TAG}"
          # YAML-aware transform: drop the build: key and rewrite image: to
          # the registry reference.  Safer than sed range-deletes which break
          # when indentation or key ordering changes.
          python3 -c "
          import sys, yaml

          with open('docker-compose.ecube.yml') as f:
              doc = yaml.safe_load(f)

          svc = doc.get('services', {}).get('ecube-app')
          if svc is None:
              print('ERROR: ecube-app service not found in compose file', file=sys.stderr)
              sys.exit(1)

          svc.pop('build', None)
          svc['image'] = '${IMAGE}'

          with open('dist/docker-compose.yml', 'w') as f:
              yaml.dump(doc, f, default_flow_style=False, sort_keys=False)
          "

      - name: Upload production docker-compose to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-and-smoke-test.outputs.tag }}
          files: dist/docker-compose.yml
          overwrite_files: true

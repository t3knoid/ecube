<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="ECUBE 2U appliance chassis with front I O and four-port USB PCI expansion">
  <defs>
    <linearGradient id="top" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2d3139" />
      <stop offset="100%" stop-color="#171a20" />
    </linearGradient>
    <linearGradient id="front" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#242932" />
      <stop offset="100%" stop-color="#10141a" />
    </linearGradient>
    <linearGradient id="side" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1d2128" />
      <stop offset="100%" stop-color="#0e1116" />
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#d6dce5" />
      <stop offset="100%" stop-color="#9aa5b5" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
    <pattern id="vent" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.7" fill="#98a2b3" opacity="0.45" />
    </pattern>
  </defs>

  <rect width="900" height="520" fill="#f8fafc"/>
  <ellipse cx="470" cy="420" rx="320" ry="38" fill="#94a3b8" opacity="0.18"/>

  <g filter="url(#shadow)">
    <polygon points="230,55 825,140 690,305 100,220" fill="url(#top)" stroke="#0f172a" stroke-width="2"/>
    <polygon points="100,220 690,305 690,395 100,395" fill="url(#front)" stroke="#0f172a" stroke-width="2"/>
    <polygon points="690,305 825,140 825,230 690,395" fill="url(#side)" stroke="#0f172a" stroke-width="2"/>

    <rect x="320" y="82" width="160" height="70" rx="6" fill="url(#vent)" opacity="0.95"/>

    <rect x="125" y="245" width="250" height="86" rx="4" fill="#0b0f14" stroke="#313845"/>
    <rect x="145" y="268" width="108" height="28" rx="4" fill="#1f2937" stroke="#475569"/>
    <circle cx="274" cy="282" r="7" fill="#84cc16"/>
    <circle cx="298" cy="282" r="7" fill="#22c55e"/>
    <circle cx="322" cy="282" r="7" fill="#60a5fa"/>
    <rect x="190" y="305" width="30" height="12" rx="2" fill="#2563eb"/>
    <rect x="226" y="305" width="30" height="12" rx="2" fill="#2563eb"/>

    <rect x="395" y="230" width="182" height="108" rx="6" fill="#111827" stroke="#374151"/>
    <rect x="430" y="255" width="120" height="56" rx="4" fill="url(#metal)" stroke="#64748b"/>
    <circle cx="446" cy="271" r="8" fill="#94a3b8"/>
    <rect x="470" y="264" width="18" height="10" rx="2" fill="#334155"/>
    <rect x="500" y="262" width="28" height="18" rx="3" fill="#60a5fa" stroke="#1d4ed8"/>
    <rect x="500" y="286" width="28" height="18" rx="3" fill="#60a5fa" stroke="#1d4ed8"/>
    <rect x="534" y="262" width="28" height="18" rx="3" fill="#60a5fa" stroke="#1d4ed8"/>
    <rect x="534" y="286" width="28" height="18" rx="3" fill="#60a5fa" stroke="#1d4ed8"/>

    <g fill="#cbd5e1" opacity="0.9">
      <rect x="605" y="230" width="18" height="108" rx="2"/>
      <rect x="632" y="230" width="18" height="108" rx="2"/>
      <rect x="659" y="230" width="18" height="108" rx="2"/>
    </g>

    <rect x="96" y="212" width="18" height="200" rx="9" fill="#20242c"/>
    <rect x="678" y="292" width="18" height="120" rx="9" fill="#20242c"/>
  </g>

  <g transform="translate(110 414)">
    <rect x="0" y="0" width="290" height="34" rx="17" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="145" y="22" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">Representative 2U ECUBE appliance chassis</text>
  </g>
</svg>

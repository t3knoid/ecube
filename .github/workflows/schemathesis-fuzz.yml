name: Schemathesis API Fuzz

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  schemathesis:
    name: Schemathesis (OpenAPI Fuzz)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: ecube
          POSTGRES_PASSWORD: ecube
          POSTGRES_DB: ecube
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecube"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ecube:ecube@localhost/ecube
      SECRET_KEY: ci-test-secret-key-do-not-use-in-production
      ROLE_RESOLVER: local
      LOCAL_GROUP_ROLE_MAP: '{"evidence-admins": ["admin"], "evidence-team": ["processor", "auditor"]}'
      SESSION_BACKEND: cookie
      USB_DISCOVERY_INTERVAL: 0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and Schemathesis
        run: |
          pip install -e ".[dev]"
          pip install schemathesis

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Generate admin JWT
        id: auth
        run: |
          TOKEN=$(python - <<'PY'
          import jwt, time
          payload = {
              'sub': 'ci-admin',
              'username': 'ci-admin',
              'groups': ['evidence-admins'],
              'roles': ['admin'],
              'exp': int(time.time()) + 3600,
          }
          import os
          print(jwt.encode(payload, os.environ['SECRET_KEY'], algorithm='HS256'))
          PY
          )
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Start API server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            echo "Waiting for server… attempt $i/30"
            sleep 1
          done
          curl -sf http://localhost:8000/health || (echo "::error::Server failed to start within 30s" && exit 1)

      - name: Run Schemathesis
        run: |
          st run http://localhost:8000/openapi.json \
            --header "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            --checks all \
            --max-examples 50 \
            --report ndjson \
            > schemathesis-report.ndjson 2>&1 \
            || true

      - name: Upload Schemathesis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-report
          path: schemathesis-report.ndjson
          retention-days: 30

      - name: Schemathesis pass/fail check
        run: |
          if [ ! -f schemathesis-report.ndjson ]; then
            echo "::error::Schemathesis report not found — Schemathesis may have crashed before writing output"
            exit 1
          fi
          python - <<'PY'
          import json, pathlib, sys
          text = pathlib.Path('schemathesis-report.ndjson').read_text()
          if not text.strip():
              print('::error::Schemathesis report is empty — scan may have failed silently')
              sys.exit(1)
          errors = 0
          parse_failures = 0
          for lineno, line in enumerate(text.splitlines(), 1):
              if not line.strip():
                  continue
              try:
                  event = json.loads(line)
              except json.JSONDecodeError:
                  parse_failures += 1
                  continue
              if event.get('event') == 'InternalError':
                  errors += 1
              if event.get('event') == 'AfterExecution':
                  status = event.get('status', '')
                  if status in ('error', 'failure'):
                      errors += 1
          if parse_failures:
              print(f'::warning::Could not parse {parse_failures} line(s) in Schemathesis report')
          print(f'Errors/failures: {errors}')
          if errors > 0:
              print(f'::warning::Schemathesis found {errors} issue(s) — review the report artifact')
          PY

services:
  ecube-app:
    build:
      context: .
      dockerfile: deploy/ecube-host/Dockerfile
    container_name: ecube-app-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ecube:ecube@postgres-dev:5432/ecube
      PYTHONUNBUFFERED: "1"
      ECUBE_RUN_MIGRATIONS_ON_START: "true"
      ECUBE_DB_WAIT_MAX_RETRIES: "30"
      ECUBE_DB_WAIT_SECONDS: "2"
      USE_SUDO: "false"
    volumes:
      - ecube_runtime_data:/var/lib/ecube
    depends_on:
      postgres-dev:
        condition: service_healthy

  postgres-dev:
    image: postgres:16
    container_name: ecube-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecube
      POSTGRES_USER: ecube
      POSTGRES_PASSWORD: ecube
    ports:
      - "5432:5432"
    volumes:
      - ecube_postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecube -d ecube"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ecube_runtime_data:
  ecube_postgres_dev_data:

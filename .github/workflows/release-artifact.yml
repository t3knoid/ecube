name: Publish Release Artifact

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history and ability to push back to main
          ref: main

      - name: Set artifact metadata
        id: meta
        run: |
          echo "artifact_name=ecube-package-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          # Strip leading 'v' to get a PEP 440 version string (e.g. v0.2.0 → 0.2.0)
          echo "pkg_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.meta.outputs.pkg_version }}\"/" pyproject.toml

      - name: Commit version stamp back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: release ${{ steps.meta.outputs.pkg_version }}" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'  # matches engines.node in frontend/package.json (^20.19.0 || >=22.12.0)
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Create deployment package
        run: |
          chmod 755 install.sh
          mkdir -p dist
          tar -czf "dist/${{ steps.meta.outputs.artifact_name }}.tar.gz" \
            --transform "s|^|${{ steps.meta.outputs.artifact_name }}/|" \
            install.sh \
            app \
            alembic \
            pyproject.toml \
            alembic.ini \
            frontend/dist \
            README.md \
            LICENSE

      - name: Generate checksum
        run: |
          cd dist
          sha256sum "${{ steps.meta.outputs.artifact_name }}.tar.gz" > "${{ steps.meta.outputs.artifact_name }}.sha256"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/${{ steps.meta.outputs.artifact_name }}.tar.gz
            dist/${{ steps.meta.outputs.artifact_name }}.sha256

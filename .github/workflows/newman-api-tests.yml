name: Newman API Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  newman:
    name: Newman (Postman Collection)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: ecube
          POSTGRES_PASSWORD: ecube
          POSTGRES_DB: ecube
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecube"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ecube:ecube@localhost/ecube
      SECRET_KEY: ci-test-secret-key-do-not-use-in-production
      ROLE_RESOLVER: local
      LOCAL_GROUP_ROLE_MAP: '{"evidence-admins": ["admin"], "evidence-team": ["processor", "auditor"]}'
      SESSION_BACKEND: cookie

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Generate admin JWT for Newman
        id: auth
        run: |
          TOKEN=$(python -c "
          import jwt, time
          payload = {
              'sub': 'ci-admin',
              'username': 'ci-admin',
              'groups': ['evidence-admins'],
              'roles': ['admin'],
              'exp': int(time.time()) + 3600,
          }
          print(jwt.encode(payload, 'ci-test-secret-key-do-not-use-in-production', algorithm='HS256'))
          ")
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Start API server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/health || (echo "Server failed to start" && exit 1)

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Newman collection
        run: |
          newman run postman/ecube-postman-collection.json \
            --env-var "base_url=http://localhost:8000" \
            --env-var "token=${{ steps.auth.outputs.token }}" \
            --reporters cli,json,htmlextra \
            --reporter-json-export newman-report.json \
            --reporter-htmlextra-export newman-report.html \
            || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: |
            newman-report.json
            newman-report.html
          retention-days: 30

      - name: Newman pass/fail check
        run: |
          FAILURES=$(python -c "
          import json, pathlib
          r = json.loads(pathlib.Path('newman-report.json').read_text())
          stats = r.get('run', {}).get('stats', {}).get('assertions', {})
          print(stats.get('failed', 0))
          ")
          echo "Failed assertions: $FAILURES"
          if [ "$FAILURES" -gt 0 ]; then
            echo "::error::Newman found $FAILURES failed assertion(s)"
            exit 1
          fi

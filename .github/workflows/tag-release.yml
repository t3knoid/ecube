name: Tag and Draft Release on Version Bump

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - pyproject.toml

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pyproject.toml
        id: meta
        run: |
          version=$(grep '^version = ' pyproject.toml | sed 's/version = "//;s/"//')
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version in pyproject.toml: '$version'"
            echo "Expected strict semantic version format: X.Y.Z (for example: 1.2.3)"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=ecube-package-v${version}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.meta.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.meta.outputs.version }} already exists — skipping release creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.meta.outputs.tag }}" -m "Release ${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'  # matches engines.node in frontend/package.json (^20.19.0 || >=22.12.0)
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Create deployment package
        run: |
          chmod 755 install.sh
          mkdir -p dist
          tar -czf "dist/${{ steps.meta.outputs.artifact_name }}.tar.gz" \
            --transform "s|^|${{ steps.meta.outputs.artifact_name }}/|" \
            install.sh \
            app \
            alembic \
            deploy \
            pyproject.toml \
            alembic.ini \
            frontend/dist \
            README.md \
            LICENSE

      - name: Generate checksum
        run: |
          cd dist
          sha256sum "${{ steps.meta.outputs.artifact_name }}.tar.gz" > "${{ steps.meta.outputs.artifact_name }}.sha256"

      - name: Create/update draft release and upload installer assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: true
          generate_release_notes: true
          files: |
            dist/${{ steps.meta.outputs.artifact_name }}.tar.gz
            dist/${{ steps.meta.outputs.artifact_name }}.sha256
          overwrite_files: true

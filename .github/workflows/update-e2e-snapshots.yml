name: Update E2E Snapshots

# Manually triggered from the Actions tab. Select the branch you want to
# regenerate snapshots for (e.g. UI-Phase-6--Testing). The workflow runs
# Playwright with --update-snapshots on ubuntu-latest (linux), commits the
# refreshed PNG baselines, and pushes them back to the same branch.
on:
  workflow_dispatch:

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium + WebKit)
        run: npx playwright install --with-deps chromium webkit

      - name: Build frontend
        run: npm run build

      # --update-snapshots regenerates all baselines. The step is allowed to
      # exit non-zero so the commit step always runs even if unrelated tests
      # fail (e.g. non-snapshot assertions). The snapshot files are what matter.
      - name: Regenerate E2E snapshots
        run: npx playwright test --update-snapshots
        continue-on-error: true

      - name: Commit updated snapshots
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/e2e/theme.spec.js-snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: update e2e visual regression snapshots [skip ci]"
            git push
          fi

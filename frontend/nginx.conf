server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy — strip /api prefix and forward to FastAPI backend
    location = /api {
        return 308 /api/;
    }

    location /api/ {
        proxy_pass http://ecube-app:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI docs passthrough
    location /docs {
        proxy_pass http://ecube-app:8000/docs;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass http://ecube-app:8000/redoc;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://ecube-app:8000/openapi.json;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Theme CSS files — served statically
    location ~ ^/themes/([A-Za-z0-9][A-Za-z0-9._-]*\.css)$ {
        alias /usr/share/nginx/html/themes/$1;
            add_header Cache-Control "public, max-age=3600";
    }

    # Theme manifest used by the frontend to discover available themes
    location = /themes/manifest.json {
        alias /usr/share/nginx/html/themes/manifest.json;
            add_header Cache-Control "public, max-age=300";
    }

    # Theme logo assets referenced by manifest.json
    location ~ ^/themes/([A-Za-z0-9][A-Za-z0-9._-]*\.(svg|png|gif|webp))$ {
        alias /usr/share/nginx/html/themes/$1;
            add_header Cache-Control "public, max-age=3600";
    }

    # Block all other requests under /themes/
    location /themes/ {
        return 404;
    }

    # SPA fallback — client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}

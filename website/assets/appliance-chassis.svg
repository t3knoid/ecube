<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="ECUBE appliance direct front view with a PCI board showing four USB ports">
  <defs>
    <linearGradient id="bezel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2a2f38" />
      <stop offset="100%" stop-color="#11151b" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#d8dde6" />
      <stop offset="100%" stop-color="#a3adbb" />
    </linearGradient>
    <linearGradient id="shadow" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.02" />
    </linearGradient>
    <pattern id="mesh" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2.1" fill="#717b8b" opacity="0.5" />
    </pattern>
    <filter id="drop" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.16" />
    </filter>
  </defs>

  <rect width="1200" height="700" fill="#f8fafc" />
  <ellipse cx="600" cy="585" rx="390" ry="44" fill="#94a3b8" opacity="0.14" />

  <g filter="url(#drop)">
    <rect x="90" y="145" width="1020" height="340" rx="18" fill="url(#bezel)" stroke="#0b0f14" stroke-width="3" />
    <rect x="72" y="165" width="36" height="300" rx="14" fill="#20242c" />
    <rect x="1092" y="165" width="36" height="300" rx="14" fill="#20242c" />

    <rect x="128" y="180" width="345" height="110" rx="8" fill="url(#mesh)" opacity="0.95" />
    <rect x="128" y="302" width="345" height="95" rx="8" fill="#0b1016" stroke="#2e3642" />
    <rect x="155" y="330" width="110" height="28" rx="5" fill="#1f2937" stroke="#4b5563" />
    <circle cx="300" cy="345" r="8" fill="#84cc16" />
    <circle cx="330" cy="345" r="8" fill="#22c55e" />
    <circle cx="360" cy="345" r="8" fill="#60a5fa" />
    <rect x="195" y="368" width="34" height="14" rx="3" fill="#2563eb" />
    <rect x="236" y="368" width="34" height="14" rx="3" fill="#2563eb" />

    <rect x="505" y="180" width="350" height="110" rx="8" fill="url(#mesh)" opacity="0.95" />
    <rect x="505" y="302" width="350" height="120" rx="8" fill="#0f1319" stroke="#2f3845" />
    <rect x="545" y="322" width="170" height="78" rx="6" fill="url(#panel)" stroke="#7c8797" />
    <circle cx="565" cy="340" r="10" fill="#98a2b3" />
    <rect x="595" y="334" width="18" height="12" rx="2" fill="#475569" />
    <rect x="635" y="330" width="44" height="16" rx="3" fill="#2563eb" stroke="#1d4ed8" />
    <rect x="635" y="354" width="44" height="16" rx="3" fill="#2563eb" stroke="#1d4ed8" />
    <rect x="686" y="330" width="44" height="16" rx="3" fill="#2563eb" stroke="#1d4ed8" />
    <rect x="686" y="354" width="44" height="16" rx="3" fill="#2563eb" stroke="#1d4ed8" />
    <text x="682" y="392" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">4-port USB PCI board</text>

    <g fill="#d1d5db" opacity="0.95">
      <rect x="892" y="188" width="20" height="226" rx="3" />
      <rect x="925" y="188" width="20" height="226" rx="3" />
      <rect x="958" y="188" width="20" height="226" rx="3" />
      <rect x="991" y="188" width="20" height="226" rx="3" />
    </g>

    <rect x="120" y="428" width="960" height="18" rx="9" fill="url(#shadow)" />
  </g>
</svg>

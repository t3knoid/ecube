name: QA Test-Case Sync Check

on:
  pull_request:
    paths:
      - 'documents/testing/01-qa-testing-guide-baremetal.md'
      - 'documents/testing/ecube-qa-test-cases.xlsx'
      - 'scripts/sync_qa_test_cases.py'

jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Verify QA test-case sync
        run: python scripts/sync_qa_test_cases.py --check

---
# =============================================================================
# ECUBE — Ansible Deployment Playbook
# =============================================================================
# Deploys the ECUBE application from a GitHub release to a Linux VM.
#
# PREREQUISITES (control machine):
#   pip install ansible              # Ansible 2.14+
#   ansible-galaxy collection install community.postgresql  # only if install_postgres: true
#
# USAGE:
#   # Deploy (prompted interactively for version — hit Enter for latest)
#   ansible-playbook -i inventory.ini deploy.yml
#
#   # Deploy a specific version non-interactively
#   ansible-playbook -i inventory.ini deploy.yml -e "ecube_version=v1.2.0"
#
#   # Dry-run (check mode — no changes made)
#   ansible-playbook -i inventory.ini deploy.yml --check
#
#   # Deploy using an Ansible Vault for secrets
#   ansible-playbook -i inventory.ini deploy.yml --ask-vault-pass
#
#   # Skip the first-run setup wizard (e.g. on re-deploy)
#   ansible-playbook -i inventory.ini deploy.yml -e "run_setup_wizard=false"
#
# NOTE: passing -e "ecube_version=..." on the command line skips the prompt.
#
# Variables are defined in group_vars/ecube_hosts.yml.
# =============================================================================

- name: Deploy ECUBE to target VM
  hosts: ecube_hosts
  become: true   # most tasks require root; individual tasks drop to ecube_user

  vars_prompt:
    - name: ecube_version
      prompt: "ECUBE version to deploy (e.g. v1.2.0) — press Enter for latest"
      default: "latest"
      private: false

  vars_files:
    # Uncomment to load secrets from a vault file:
    # - group_vars/vault.yml

  # --------------------------------------------------------------------------
  # 1. Resolve release version
  # --------------------------------------------------------------------------
  pre_tasks:
    - name: Fetch latest GitHub release tag
      when: ecube_version in ["", "latest"]
      uri:
        url: "https://api.github.com/repos/{{ github_owner }}/{{ github_repo }}/releases/latest"
        headers:
          Accept: "application/vnd.github+json"
        return_content: true
      register: _github_latest

    - name: Set ecube_version from GitHub API response
      when: ecube_version in ["", "latest"]
      set_fact:
        ecube_version: "{{ _github_latest.json.tag_name }}"

    - name: Show resolved version
      debug:
        msg: "Deploying ECUBE {{ ecube_version }}"

  # --------------------------------------------------------------------------
  tasks:

  # --- Optional: install PostgreSQL locally --------------------------------
  - name: Install PostgreSQL {{ postgres_version }}
    when: install_postgres | bool
    block:
      - name: Install PostgreSQL packages
        apt:
          name:
            - "postgresql-{{ postgres_version }}"
            - python3-psycopg2
          state: present
          update_cache: true

      - name: Ensure PostgreSQL is started and enabled
        service:
          name: postgresql
          state: started
          enabled: true

      - name: Create PostgreSQL application user
        become_user: postgres
        community.postgresql.postgresql_user:
          name: "{{ postgres_user }}"
          password: "{{ postgres_password }}"
          state: present

      - name: Create PostgreSQL application database
        become_user: postgres
        community.postgresql.postgresql_db:
          name: "{{ postgres_db }}"
          owner: "{{ postgres_user }}"
          state: present

  # --- System dependencies --------------------------------------------------
  - name: Install system packages
    apt:
      name:
        - python3.11
        - python3.11-venv
        - python3.11-dev
        - python3-pip
        - openssl
        - curl
        - ca-certificates
        # USB / mount utilities used by ECUBE at runtime
        - usbutils
        - util-linux
        - exfatprogs
        - nfs-common
        - cifs-utils
      state: present
      update_cache: true

  # --- Service account & directories ----------------------------------------
  - name: Create ecube OS group
    group:
      name: "{{ ecube_group }}"
      system: true
      state: present

  - name: Create ecube OS user
    user:
      name: "{{ ecube_user }}"
      group: "{{ ecube_group }}"
      system: true
      create_home: true
      shell: /bin/bash
      state: present

  - name: Create install and cert directories
    file:
      path: "{{ item }}"
      state: directory
      owner: "{{ ecube_user }}"
      group: "{{ ecube_group }}"
      mode: "0755"
    loop:
      - "{{ ecube_install_dir }}"
      - "{{ ecube_certs_dir }}"

  # --- Download & verify release package ------------------------------------
  - name: Set package filename
    set_fact:
      _pkg_name: "ecube-package-{{ ecube_version }}.tar.gz"
      _sha_name: "ecube-package-{{ ecube_version }}.sha256"
      _pkg_url:  "https://github.com/{{ github_owner }}/{{ github_repo }}/releases/download/{{ ecube_version }}/ecube-package-{{ ecube_version }}.tar.gz"
      _sha_url:  "https://github.com/{{ github_owner }}/{{ github_repo }}/releases/download/{{ ecube_version }}/ecube-package-{{ ecube_version }}.sha256"

  - name: Download release package
    get_url:
      url: "{{ _pkg_url }}"
      dest: "/tmp/{{ _pkg_name }}"
      mode: "0644"

  - name: Download checksum file
    get_url:
      url: "{{ _sha_url }}"
      dest: "/tmp/{{ _sha_name }}"
      mode: "0644"

  - name: Read expected checksum
    slurp:
      src: "/tmp/{{ _sha_name }}"
    register: _sha_file

  - name: Parse expected SHA-256 hash
    set_fact:
      _expected_sha: "{{ (_sha_file.content | b64decode).split()[0] }}"

  - name: Compute actual SHA-256 of downloaded package
    stat:
      path: "/tmp/{{ _pkg_name }}"
      checksum_algorithm: sha256
      get_checksum: true
    register: _pkg_stat

  - name: Verify package checksum
    assert:
      that: _pkg_stat.stat.checksum == _expected_sha
      fail_msg: >
        Checksum mismatch for {{ _pkg_name }}!
        Expected: {{ _expected_sha }}
        Got:      {{ _pkg_stat.stat.checksum }}
      success_msg: "Checksum OK."

  - name: Extract release package to {{ ecube_install_dir }}
    unarchive:
      src: "/tmp/{{ _pkg_name }}"
      dest: "{{ ecube_install_dir }}"
      remote_src: true
      owner: "{{ ecube_user }}"
      group: "{{ ecube_group }}"
      extra_opts: ["--strip-components=1"]

  # --- Python virtual environment & package install -------------------------
  - name: Create Python virtual environment
    become_user: "{{ ecube_user }}"
    command:
      cmd: python3.11 -m venv {{ ecube_venv }}
      creates: "{{ ecube_venv }}/bin/python"

  - name: Upgrade pip inside venv
    become_user: "{{ ecube_user }}"
    pip:
      name: [pip, setuptools, wheel]
      state: latest
      virtualenv: "{{ ecube_venv }}"

  - name: Install ECUBE package from extracted source
    become_user: "{{ ecube_user }}"
    pip:
      name: "{{ ecube_install_dir }}"
      extra_args: "-e"
      virtualenv: "{{ ecube_venv }}"

  # --- TLS certificates -----------------------------------------------------
  - name: Copy provided TLS certificate to VM
    when: ecube_cert_src != ""
    copy:
      src: "{{ ecube_cert_src }}"
      dest: "{{ ecube_certs_dir }}/cert.pem"
      owner: "{{ ecube_user }}"
      group: "{{ ecube_group }}"
      mode: "0644"

  - name: Copy provided TLS private key to VM
    when: ecube_key_src != ""
    copy:
      src: "{{ ecube_key_src }}"
      dest: "{{ ecube_certs_dir }}/key.pem"
      owner: "{{ ecube_user }}"
      group: "{{ ecube_group }}"
      mode: "0600"

  - name: Generate self-signed certificate (if no cert provided)
    when: ecube_cert_src == ""
    become_user: "{{ ecube_user }}"
    command:
      cmd: >
        openssl req -newkey rsa:2048 -nodes
        -keyout {{ ecube_certs_dir }}/key.pem
        -x509 -days 365
        -out {{ ecube_certs_dir }}/cert.pem
        -subj "/CN={{ ecube_tls_cn }}"
      creates: "{{ ecube_certs_dir }}/cert.pem"

  - name: Restrict private key permissions
    file:
      path: "{{ ecube_certs_dir }}/key.pem"
      owner: "{{ ecube_user }}"
      group: "{{ ecube_group }}"
      mode: "0600"

  # --- sudoers for OS user management ---------------------------------------
  - name: Install ecube sudoers file
    copy:
      src: "{{ playbook_dir }}/../../deploy/ecube-sudoers"
      dest: /etc/sudoers.d/ecube-user-mgmt
      owner: root
      group: root
      mode: "0440"
      validate: "visudo -cf %s"

  # --- Application configuration (.env) ------------------------------------
  - name: Deploy .env configuration
    template:
      src: templates/ecube.env.j2
      dest: "{{ ecube_install_dir }}/.env"
      owner: "{{ ecube_user }}"
      group: "{{ ecube_group }}"
      mode: "0640"
    notify: Restart ecube

  # --- Database migrations --------------------------------------------------
  - name: Run Alembic migrations
    become_user: "{{ ecube_user }}"
    command:
      cmd: "{{ ecube_venv }}/bin/alembic upgrade head"
      chdir: "{{ ecube_install_dir }}"
    environment:
      DATABASE_URL: "postgresql://{{ postgres_user }}:{{ postgres_password }}@localhost/{{ postgres_db }}"

  # --- Systemd service ------------------------------------------------------
  - name: Install systemd service unit
    template:
      src: templates/ecube.service.j2
      dest: /etc/systemd/system/ecube.service
      owner: root
      group: root
      mode: "0644"
    notify:
      - Reload systemd
      - Restart ecube

  - name: Enable and start ecube service
    service:
      name: ecube
      state: started
      enabled: true

  # Flush handlers NOW so the service is running before the setup wizard step.
  - name: Flush handlers before setup wizard
    meta: flush_handlers

  # --- First-run setup wizard -----------------------------------------------
  - name: Check if ECUBE is already initialized
    uri:
      url: "https://localhost:{{ ecube_port }}/setup/status"
      validate_certs: false
      status_code: 200
    register: _setup_status
    retries: 10
    delay: 3
    until: _setup_status.status == 200

  - name: Run first-run initialization via API
    when:
      - run_setup_wizard | bool
      - not _setup_status.json.initialized
    uri:
      url: "https://localhost:{{ ecube_port }}/setup/initialize"
      method: POST
      validate_certs: false
      body_format: json
      body:
        username: "{{ ecube_admin_username }}"
        password: "{{ ecube_admin_password }}"
      status_code: 200
    register: _setup_result

  - name: Show setup result
    when:
      - run_setup_wizard | bool
      - not _setup_status.json.initialized
    debug:
      var: _setup_result.json

  # --------------------------------------------------------------------------
  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Restart ecube
      service:
        name: ecube
        state: restarted

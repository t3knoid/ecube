services:
  ecube-app:
    build:
      context: .
      dockerfile: deploy/ecube-host/Dockerfile
    image: ecube-app
    container_name: ecube-app
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    # Development convenience: publish API port 8000 to localhost.
    # This is NOT a typical hardened deployment shape.
    # Typical Docker deployments should expose only ecube-ui on 8443.
    # For production-like behavior, avoid direct host exposure of port 8000.
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ecube}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-ecube}
      PYTHONUNBUFFERED: "1"
      TRUST_PROXY_HEADERS: "true"
      ECUBE_RUN_MIGRATIONS_ON_START: "true"
      ECUBE_DB_WAIT_MAX_RETRIES: "30"
      ECUBE_DB_WAIT_SECONDS: "2"
      USE_SUDO: "false"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-please-rotate-32b}"
      LOCAL_GROUP_ROLE_MAP: '${LOCAL_GROUP_ROLE_MAP:-{}}'
      USB_DISCOVERY_INTERVAL: "${USB_DISCOVERY_INTERVAL:-30}"
      # nginx strips /api before forwarding — tell FastAPI its mounted prefix
      # so Swagger UI "Try it out" generates correct request paths.
      API_ROOT_PATH: "/api"
    volumes:
      - ecube_runtime_data:/var/lib/ecube
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
      - /sys/bus/usb:/sys/bus/usb:ro
      - /proc:/host_proc:ro
    depends_on:
      postgres:
        condition: service_healthy

  ecube-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ecube-ui
    container_name: ecube-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-8443}:443"
    volumes:
      - ${ECUBE_CERTS_DIR:-./deploy/certs}:/etc/nginx/certs:ro
      - ${ECUBE_THEMES_DIR:-./deploy/themes}:/usr/share/nginx/html/themes:ro
    depends_on:
      - ecube-app

  postgres:
    image: postgres:16
    container_name: ecube-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-ecube}"
      POSTGRES_USER: "${POSTGRES_USER:-ecube}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - ecube_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ecube_runtime_data:
  ecube_postgres_data:

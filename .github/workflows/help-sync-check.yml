name: Help Sync Check

on:
  pull_request:
    paths:
      - 'docs/operations/13-user-manual.md'
      - 'frontend/public/help/manual.html'
      - 'scripts/build-help.mjs'
      - 'frontend/package.json'
      - '.github/workflows/help-sync-check.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/operations/13-user-manual.md'
      - 'frontend/public/help/manual.html'
      - 'scripts/build-help.mjs'
      - 'frontend/package.json'
      - '.github/workflows/help-sync-check.yml'

jobs:
  check-sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify generated help is up to date
        run: npm run build:help:check
name: Schemathesis API Fuzz

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schemathesis:
    name: Schemathesis (OpenAPI Fuzz)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: ecube
          POSTGRES_PASSWORD: ecube
          POSTGRES_DB: ecube
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecube"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ecube:ecube@localhost/ecube
      SECRET_KEY: ci-test-secret-key-do-not-use-in-production
      ROLE_RESOLVER: local
      LOCAL_GROUP_ROLE_MAP: '{"evidence-admins": ["admin"], "evidence-team": ["processor", "auditor"]}'
      SESSION_BACKEND: cookie
      USB_DISCOVERY_INTERVAL: 0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and Schemathesis
        run: |
          pip install -e ".[dev]"
          pip install schemathesis

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Generate admin JWT
        id: auth
        run: |
          TOKEN=$(python - <<'PY'
          import jwt, time
          payload = {
              'sub': 'ci-admin',
              'username': 'ci-admin',
              'groups': ['evidence-admins'],
              'roles': ['admin'],
              'exp': int(time.time()) + 3600,
          }
          import os
          print(jwt.encode(payload, os.environ['SECRET_KEY'], algorithm='HS256'))
          PY
          )
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Start API server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            echo "Waiting for server… attempt $i/30"
            sleep 1
          done
          curl -sf http://localhost:8000/health || (echo "::error::Server failed to start within 30s" && exit 1)

      - name: Run Schemathesis
        timeout-minutes: 10
        run: |
          st run http://localhost:8000/openapi.json \
            --header "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            --checks all \
            --max-examples 50 \
            --request-timeout 10 \
            --phases coverage,fuzzing \
            2>&1 | tee schemathesis-output.txt \
            || true

      - name: Upload Schemathesis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-report
          path: schemathesis-output.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Schemathesis pass/fail check
        run: |
          if [ ! -f schemathesis-output.txt ]; then
            echo "::error::Schemathesis output not found — Schemathesis may have crashed before writing output"
            exit 1
          fi
          if [ ! -s schemathesis-output.txt ]; then
            echo "::error::Schemathesis output is empty — scan may have failed silently"
            exit 1
          fi
          if grep -qiE '(FAILURES|ERRORS)\s*[1-9]' schemathesis-output.txt; then
            echo "::warning::Schemathesis found issues — review the report artifact"
          fi

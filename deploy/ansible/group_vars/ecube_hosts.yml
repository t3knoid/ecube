# ---------------------------------------------------------------------------
# ECUBE deployment variables
# Copy this file to group_vars/ecube_hosts.yml and edit before running.
# Secrets (db_password, admin_password, secret_key) should be stored in an
# Ansible Vault file (ansible-vault create group_vars/vault.yml) and
# referenced here with vault_ prefixed variables.
# ---------------------------------------------------------------------------

# --- GitHub release ---
# Use "latest" to auto-detect the latest published release, or pin a tag e.g. "v1.2.0".
ecube_version: "latest"

github_owner: "t3knoid"
github_repo:  "ecube"

# --- Installation paths ---
ecube_install_dir: /opt/ecube
ecube_setup_download_dir: /tmp/ecube-download
ecube_setup_extract_dir: /tmp/ecube-package
ecube_setup_cleanup_downloads: true
ecube_setup_no_tls: false
ecube_setup_demo: false

# Base URL used by setup API calls. These endpoints are local-only and should
# be reached from the ECUBE host itself.
ecube_port: 8443
ecube_setup_base_url: "https://localhost:{{ ecube_port }}"

# --- PostgreSQL (installed by a separate role or process) ---
# By default PostgreSQL is expected on the same host as ECUBE. Override
# postgres_host when the database runs elsewhere.
postgres_host: localhost
postgres_port: 5432

# Privileged PostgreSQL role used by the setup API to provision the ECUBE app
# database and run migrations.
postgres_admin_username: ecube
# Reference vault variable: postgres_admin_password: "{{ vault_postgres_admin_password }}"
postgres_admin_password: "changeme"

# Application database created or updated by the setup API.
postgres_db:       ecube
postgres_user:     ecube
# Reference vault variable: postgres_password: "{{ vault_postgres_password }}"
postgres_password: "changeme"

# --- First-run setup (admin user created via setup API) ---
# Set to false if you handle provisioning or initialization manually.
run_setup_wizard: true
ecube_admin_username: "ecube-admin"
# Reference vault variable: ecube_admin_password: "{{ vault_ecube_admin_password }}"
ecube_admin_password: "changeme"
ecube_trust_proxy_headers: false

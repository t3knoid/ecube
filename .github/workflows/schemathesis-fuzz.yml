name: Schemathesis API Fuzz

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schemathesis:
    name: Schemathesis (OpenAPI Fuzz)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and Schemathesis
        run: |
          pip install -e ".[dev]"
          pip install schemathesis PyJWT

      - name: Run Schemathesis
        timeout-minutes: 20
        env:
          SECRET_KEY: ci-test-secret-key-do-not-use-in-production
          HOST_PORT: 8000
          POSTGRES_HOST_PORT: 5432
          SCHEMATHESIS_MAX_WAIT: 90
          SCHEMATHESIS_MAX_EXAMPLES: 5
          SCHEMATHESIS_REQUEST_TIMEOUT: 10
          SCHEMATHESIS_PHASES: coverage
          SCHEMATHESIS_WORKERS: 1
          SCHEMATHESIS_MAX_FAILURES: 1
          SCHEMATHESIS_CHECKS: not_a_server_error,status_code_conformance
          SCHEMATHESIS_EXCLUDE_CHECKS: unsupported_method,missing_required_header
          SCHEMATHESIS_INCLUDE_PATH_REGEX: ^/(health|introspection/version|setup/status)$
          SCHEMATHESIS_WAIT_FOR_SCHEMA: 30
        run: |
          bash ./scripts/run_schemathesis.sh
          ST_EXIT=${PIPESTATUS[0]}
          echo "SCHEMATHESIS_EXIT=$ST_EXIT" >> "$GITHUB_ENV"
          # Exit 0 = clean, exit 1 = test findings (warn only).
          # Any other code = invocation/runtime error → fail immediately.
          if [ "$ST_EXIT" -ne 0 ] && [ "$ST_EXIT" -ne 1 ]; then
            echo "::error::Schemathesis exited with code $ST_EXIT (invocation or runtime error)"
            exit 1
          fi

      - name: Upload Schemathesis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-report
          path: schemathesis-output.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Schemathesis pass/fail check
        if: success()
        run: |
          if [ "${SCHEMATHESIS_EXIT:-}" = "1" ]; then
            echo "::warning::Schemathesis found issues (exit code 1) — review the report artifact"
          elif [ "${SCHEMATHESIS_EXIT:-}" = "0" ]; then
            echo "Schemathesis completed with no findings."
          else
            echo "::error::Schemathesis exit code not captured; review run logs and artifact"
            exit 1
          fi

name: Docker Build

# Builds both application images, runs a smoke test against the full stack,
# and (on release) pushes images to GHCR and publishes a production
# docker-compose.yml as a release asset.
#
# Jobs:
#   version-check         — detects whether pyproject.toml version field changed
#   build-and-smoke-test  — runs only when version changed (or on release/dispatch)
#   publish               — runs on published releases only; pushes images and
#                           attaches docker-compose.yml to the GitHub Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    # Only trigger when pyproject.toml could have changed (version-check job
    # further verifies the version field itself was bumped).
    paths:
      - pyproject.toml
  release:
    types: [published]

# Cancel any in-progress run for the same branch/PR when a new commit is pushed.
# Release and workflow_dispatch runs are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/ecube-app

jobs:
  version-check:
    name: Check version changed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the previous commit to diff the version field.
          fetch-depth: 2

      - name: Verify version field changed
        id: check
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            # release and workflow_dispatch always build.
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OLD=$(git show HEAD~1:pyproject.toml 2>/dev/null \
            | grep -E '^version\s*=' | sed 's/.*"\(.*\)".*/\1/')
          NEW=$(grep -E '^version\s*=' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "Previous version: ${OLD:-<none>}"
          echo "Current version:  $NEW"
          if [ "$OLD" != "$NEW" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version bumped: ${OLD:-<none>} → $NEW"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Version unchanged ($NEW) — skipping Docker build."
          fi

  build-and-smoke-test:
    name: Build and smoke test
    needs: version-check
    if: needs.version-check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SECRET_KEY: ci-smoke-test-key-not-for-production
      POSTGRES_PASSWORD: ci-smoke-test-postgres-password

    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Released via a git tag (e.g. v1.2.3).
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # Push to main that bumped the version — derive tag from pyproject.toml.
            VERSION=$(grep -E '^version\s*=' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
            echo "value=v${VERSION}" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch or any other trigger — use the commit SHA.
            echo "value=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build images
        run: docker compose -f docker-compose.ecube.yml build

      - name: Tag images for registry
        run: |
          docker tag ecube-app ${{ env.APP_IMAGE }}:${{ steps.tag.outputs.value }}

      - name: Save smoke-tested images as artifacts
        if: github.event_name == 'release'
        run: |
          mkdir -p /tmp/docker-images
          docker save "${{ env.APP_IMAGE }}:${{ steps.tag.outputs.value }}" \
            | gzip > /tmp/docker-images/ecube-app.tar.gz

      - name: Upload smoke-tested images
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/docker-images/
          retention-days: 1

      - name: Create .env for smoke test
        run: |
          printf 'SECRET_KEY=%s\nPOSTGRES_PASSWORD=%s\nPOSTGRES_USER=ecube\nPOSTGRES_DB=ecube\n' \
            "$SECRET_KEY" "$POSTGRES_PASSWORD" > .env

      - name: Start stack
        run: |
          docker compose -f docker-compose.ecube.yml up -d
          echo "Waiting for postgres to be healthy..."
          POSTGRES_READY=false
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ecube-postgres 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "postgres is healthy"
              POSTGRES_READY=true
              break
            fi
            echo "  attempt $i/30 — $STATUS"
            sleep 3
          done
          $POSTGRES_READY || { echo "::error::postgres never became healthy"; exit 1; }

      - name: Smoke test — API health check (via app container)
        run: |
          echo "Waiting for ecube-app to respond..."
          APP_READY=false
          for i in $(seq 1 20); do
            CODE=$(docker compose -f docker-compose.ecube.yml exec -T ecube-app \
              curl -skf -o /dev/null -w "%{http_code}" https://localhost:8443/api/health 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Health check passed (HTTP $CODE)"
              APP_READY=true
              break
            fi
            echo "  attempt $i/20 — HTTP $CODE"
            sleep 3
          done
          $APP_READY || { echo "::error::ecube-app health check never passed"; exit 1; }
          docker compose -f docker-compose.ecube.yml exec -T ecube-app \
            curl -skf https://localhost:8443/api/health | grep '"status"'

      - name: Smoke test — TLS health check (via host)
        run: |
          echo "Verifying TLS endpoint is reachable..."
          TLS_READY=false
          for i in $(seq 1 10); do
            CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost:8443/api/health 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "TLS health check passed (HTTP $CODE)"
              TLS_READY=true
              break
            fi
            echo "  attempt $i/10 — HTTP $CODE"
            sleep 2
          done
          $TLS_READY || { echo "::error::TLS health check never passed"; exit 1; }
          curl -sk https://localhost:8443/api/health | grep '"status"'

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.ecube.yml logs ecube-app   || true
          docker compose -f docker-compose.ecube.yml logs postgres     || true

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.ecube.yml down -v

  publish:
    name: Push images and publish release compose
    needs: build-and-smoke-test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download smoke-tested images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/docker-images

      - name: Load smoke-tested images
        # Pushes the exact linux/amd64 images that passed the smoke test — no rebuild.
        run: |
          docker load < /tmp/docker-images/ecube-app.tar.gz

      - name: Tag images with :latest
        run: |
          docker tag "${{ env.APP_IMAGE }}:${{ needs.build-and-smoke-test.outputs.tag }}" "${{ env.APP_IMAGE }}:latest"

      - name: Push ecube-app
        run: |
          docker push "${{ env.APP_IMAGE }}:${{ needs.build-and-smoke-test.outputs.tag }}"
          docker push "${{ env.APP_IMAGE }}:latest"

      - name: Generate production docker-compose
        run: |
          mkdir -p dist
          TAG="${{ needs.build-and-smoke-test.outputs.tag }}"
          # Start from the dev compose file, strip the build: block, and
          # replace the local image tag with the registry image reference.
          sed -e '/^    build:/,/^    image:/{ /^    image:/!d }' \
              -e "s|image: ecube-app|image: ${{ env.APP_IMAGE }}:${TAG}|" \
              docker-compose.ecube.yml > dist/docker-compose.yml

      - name: Upload production docker-compose to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/docker-compose.yml

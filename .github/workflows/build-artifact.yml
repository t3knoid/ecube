name: Build Deployment Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set artifact metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=ecube-package-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          # For non-release builds derive a dev version string: read the base
          # version from pyproject.toml and append the short SHA as local label.
          base=$(grep '^version = ' pyproject.toml | sed 's/version = "//;s/"//')
          echo "pkg_version=${base}.dev+${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Stamp version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.meta.outputs.pkg_version }}\"/" pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'  # matches engines.node in frontend/package.json (^20.19.0 || >=22.12.0)
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Create deployment package
        run: |
          chmod 755 install.sh
          mkdir -p dist
          tar -czf "dist/${{ steps.meta.outputs.artifact_name }}.tar.gz" \
            --transform "s|^|${{ steps.meta.outputs.artifact_name }}/|" \
            install.sh \
            app \
            alembic \
            pyproject.toml \
            alembic.ini \
            frontend/dist \
            README.md \
            LICENSE

      - name: Generate checksum
        run: |
          cd dist
          sha256sum "${{ steps.meta.outputs.artifact_name }}.tar.gz" > "${{ steps.meta.outputs.artifact_name }}.sha256"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            dist/${{ steps.meta.outputs.artifact_name }}.tar.gz
            dist/${{ steps.meta.outputs.artifact_name }}.sha256
          if-no-files-found: error
          retention-days: 30

services:
  ecube-app:
    build:
      context: .
      dockerfile: deploy/ecube-host/Dockerfile
    image: ecube-app
    container_name: ecube-app
    restart: unless-stopped
    # Port 8000 is intentionally not published to the host.
    # All API access goes through ecube-ui (nginx) on port 8443,
    # which ensures TRUST_PROXY_HEADERS cannot be exploited by
    # direct clients spoofing X-Forwarded-For / X-Real-IP.
    # For debugging: docker compose exec ecube-app curl http://localhost:8000/health
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ecube}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-ecube}
      PYTHONUNBUFFERED: "1"
      TRUST_PROXY_HEADERS: "true"
      ECUBE_RUN_MIGRATIONS_ON_START: "true"
      ECUBE_DB_WAIT_MAX_RETRIES: "30"
      ECUBE_DB_WAIT_SECONDS: "2"
      USE_SUDO: "false"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-please-rotate-32b}"
      LOCAL_GROUP_ROLE_MAP: '${LOCAL_GROUP_ROLE_MAP:-{}}'
      USB_DISCOVERY_INTERVAL: "${USB_DISCOVERY_INTERVAL:-30}"
    privileged: true
    volumes:
      - ecube_runtime_data:/var/lib/ecube
      - /dev:/dev
      - /sys:/sys:ro
      - /run/udev:/run/udev:ro
    depends_on:
      postgres:
        condition: service_healthy

  ecube-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ecube-ui
    container_name: ecube-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-8443}:443"
    volumes:
      - ${ECUBE_CERTS_DIR:-./deploy/certs}:/etc/nginx/certs:ro
      - ${ECUBE_THEMES_DIR:-./deploy/themes}:/usr/share/nginx/html/themes:ro
    depends_on:
      - ecube-app

  postgres:
    image: postgres:16
    container_name: ecube-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-ecube}"
      POSTGRES_USER: "${POSTGRES_USER:-ecube}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - ecube_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ecube_runtime_data:
  ecube_postgres_data:

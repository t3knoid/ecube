services:
  ecube-app:
    build:
      context: .
      dockerfile: deploy/ecube-host/Dockerfile
    image: ecube-app
    container_name: ecube-app
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://ecube:ecube@postgres:5432/ecube
      PYTHONUNBUFFERED: "1"
      ECUBE_RUN_MIGRATIONS_ON_START: "true"
      ECUBE_DB_WAIT_MAX_RETRIES: "30"
      ECUBE_DB_WAIT_SECONDS: "2"
      USE_SUDO: "false"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-please-rotate-32b}"
      LOCAL_GROUP_ROLE_MAP: '${LOCAL_GROUP_ROLE_MAP:-{}}'
      USB_DISCOVERY_INTERVAL: "${USB_DISCOVERY_INTERVAL:-30}"
    volumes:
      - ecube_runtime_data:/var/lib/ecube
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
      - /sys/bus/usb:/sys/bus/usb:ro
      - /proc:/host_proc:ro
    depends_on:
      postgres:
        condition: service_healthy

  ecube-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ecube-ui
    container_name: ecube-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-8443}:443"
    volumes:
      - /opt/ecube/certs:/etc/nginx/certs:ro
      - /opt/ecube/themes:/usr/share/nginx/html/themes:ro
    depends_on:
      - ecube-app

  postgres:
    image: postgres:16
    container_name: ecube-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecube
      POSTGRES_USER: ecube
      POSTGRES_PASSWORD: ecube
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - ecube_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecube -d ecube"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ecube_runtime_data:
  ecube_postgres_data:

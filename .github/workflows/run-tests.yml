name: Run Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - .github/**
      - alembic/**
      - app/**
      - pyproject.toml
      - scripts/**
      - tests/**
  push:
    branches: [main]
    paths:
      - .github/**
      - alembic/**
      - app/**
      - frontend/**
      - pyproject.toml
      - scripts/**
      - tests/**

# Cancel any in-progress run for the same branch/PR when a new commit is pushed.
# workflow_dispatch runs are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  release-migration-guard:
    name: Release migration guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e "."

      - name: Validate release-scoped migration workflow
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${GITHUB_BASE_REF}"
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            diff_range="${base_ref}...${GITHUB_SHA}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            diff_range="${{ github.event.before }}...${GITHUB_SHA}"
          else
            diff_range="HEAD~1...HEAD"
          fi

          mapfile -t changed_files < <(git diff --name-only "${diff_range}")
          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "No changed files to validate"
            exit 0
          fi

          python scripts/check_release_migration.py --repo-root . "${changed_files[@]}"

  backend-unit-tests:
    name: Unit tests (${{ matrix.os }})
    needs: release-migration-guard
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/ --ignore=tests/integration --ignore=tests/hardware -v

  backend-integration-tests:
    name: Integration tests (ubuntu)
    needs: release-migration-guard
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ecube_integration
          POSTGRES_USER: ecube_test
          POSTGRES_PASSWORD: ecube_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecube_test -d ecube_integration"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations against test database
        env:
          DATABASE_URL: postgresql://ecube_test:ecube_test@localhost:5432/ecube_integration
        run: alembic upgrade head

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://ecube_test:ecube_test@localhost:5432/ecube_integration
          INTEGRATION_DATABASE_URL: postgresql://ecube_test:ecube_test@localhost:5432/ecube_integration
        run: python -m pytest tests/integration/ -v --run-integration

  frontend-unit-tests:
    needs: release-migration-guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"  # matches engines.node in frontend/package.json (^20.19.0 || >=22.12.0)
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit

  frontend-e2e-tests:
    needs: release-migration-guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"  # matches engines.node in frontend/package.json (^20.19.0 || >=22.12.0)
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium + WebKit)
        run: npx playwright install --with-deps chromium webkit

      - name: Build frontend
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

---
# =============================================================================
# ECUBE — Ansible Deployment Playbook
# =============================================================================
# Deploys the ECUBE application from a GitHub release to a Linux VM.
#
# This playbook assumes:
# - PostgreSQL is installed by a separate role or process.
# - ECUBE is installed by running the packaged install.sh script.
# - First-run database provisioning and admin creation are completed via the
#   local setup API after the service starts.
#
# PREREQUISITES (control machine):
#   pip install ansible              # Ansible 2.14+
#
# USAGE:
#   # Deploy (prompted interactively for version — hit Enter for latest)
#   ansible-playbook -i inventory.ini deploy.yml
#
#   # Deploy a specific version non-interactively
#   ansible-playbook -i inventory.ini deploy.yml -e "ecube_version=v1.2.0"
#
#   # Dry-run (check mode — no changes made)
#   ansible-playbook -i inventory.ini deploy.yml --check
#
#   # Deploy using an Ansible Vault for secrets
#   ansible-playbook -i inventory.ini deploy.yml --ask-vault-pass
#
#   # Skip the first-run setup wizard (e.g. on re-deploy)
#   ansible-playbook -i inventory.ini deploy.yml -e "run_setup_wizard=false"
#
# NOTE: passing -e "ecube_version=..." on the command line skips the prompt.
#
# Variables are defined in group_vars/ecube_hosts.yml.
# =============================================================================

- name: Deploy ECUBE to target VM
  hosts: ecube_hosts
  become: true   # most tasks require root; individual tasks drop to ecube_user

  vars_prompt:
    - name: ecube_version
      prompt: "ECUBE version to deploy (e.g. v1.2.0) — press Enter for latest"
      default: "latest"
      private: false

  vars_files:
    # Uncomment to load secrets from a vault file:
    # - group_vars/vault.yml

  # --------------------------------------------------------------------------
  # 1. Resolve release version
  # --------------------------------------------------------------------------
  pre_tasks:
    - name: Fetch latest GitHub release tag
      when: ecube_version in ["", "latest"]
      uri:
        url: "https://api.github.com/repos/{{ github_owner }}/{{ github_repo }}/releases/latest"
        headers:
          Accept: "application/vnd.github+json"
        return_content: true
      register: _github_latest

    - name: Set ecube_version from GitHub API response
      when: ecube_version in ["", "latest"]
      set_fact:
        ecube_version: "{{ _github_latest.json.tag_name }}"

    - name: Show resolved version
      debug:
        msg: "Deploying ECUBE {{ ecube_version }}"

    - name: Set ECUBE installer facts
      set_fact:
        ecube_setup_package_name: "ecube-package-{{ ecube_version }}"
        ecube_setup_archive_name: "ecube-package-{{ ecube_version }}.tar.gz"
        ecube_setup_checksum_name: "ecube-package-{{ ecube_version }}.sha256"
        ecube_setup_package_url: "https://github.com/{{ github_owner }}/{{ github_repo }}/releases/download/{{ ecube_version }}/ecube-package-{{ ecube_version }}.tar.gz"
        ecube_setup_checksum_url: "https://github.com/{{ github_owner }}/{{ github_repo }}/releases/download/{{ ecube_version }}/ecube-package-{{ ecube_version }}.sha256"
        ecube_setup_archive_path: "{{ ecube_setup_download_dir }}/ecube-package-{{ ecube_version }}.tar.gz"
        ecube_setup_checksum_path: "{{ ecube_setup_download_dir }}/ecube-package-{{ ecube_version }}.sha256"
        ecube_setup_package_dir: "{{ ecube_setup_extract_dir }}/ecube-package-{{ ecube_version }}"
        ecube_setup_install_script_path: "{{ ecube_setup_extract_dir }}/ecube-package-{{ ecube_version }}/install.sh"

  # --------------------------------------------------------------------------
  tasks:

  # --- Installer prerequisites ----------------------------------------------
  - name: Install ECUBE installer prerequisites
    apt:
      name:
        - ca-certificates
        - tar
      state: present
      update_cache: true

  - name: Create ECUBE download and extraction directories
    file:
      path: "{{ item }}"
      state: directory
      mode: "0755"
    loop:
      - "{{ ecube_setup_download_dir }}"
      - "{{ ecube_setup_extract_dir }}"

  - name: Download ECUBE package checksum
    get_url:
      url: "{{ ecube_setup_checksum_url }}"
      dest: "{{ ecube_setup_checksum_path }}"
      mode: "0644"

  - name: Read ECUBE package checksum
    slurp:
      src: "{{ ecube_setup_checksum_path }}"
    register: ecube_setup_checksum_file

  - name: Set ECUBE package checksum fact
    set_fact:
      ecube_setup_package_sha256: >-
        {{ (ecube_setup_checksum_file.content | b64decode).split()[0] }}

  - name: Download ECUBE package archive
    get_url:
      url: "{{ ecube_setup_package_url }}"
      dest: "{{ ecube_setup_archive_path }}"
      checksum: "sha256:{{ ecube_setup_package_sha256 }}"
      mode: "0644"

  - name: Extract ECUBE package archive
    unarchive:
      src: "{{ ecube_setup_archive_path }}"
      dest: "{{ ecube_setup_extract_dir }}"
      remote_src: true

  - name: Run ECUBE installer
    command:
      argv: >-
        {{
          [
            ecube_setup_install_script_path,
            '--yes',
            '--install-dir',
            ecube_install_dir,
            '--pg-superuser-name',
            postgres_admin_username,
            '--pg-superuser-pass',
            postgres_admin_password
          ]
          + (['--no-tls'] if ecube_setup_no_tls else [])
          + (['--demo'] if ecube_setup_demo else [])
        }}
    args:
      chdir: "{{ ecube_setup_package_dir }}"
    register: ecube_setup_install_result
    changed_when: ecube_setup_install_result.rc == 0

  - name: Wait for ECUBE setup status endpoint
    uri:
      url: "{{ ecube_setup_base_url }}/setup/status"
      validate_certs: false
      status_code: 200
    register: _setup_status
    retries: 20
    delay: 3
    until: _setup_status.status == 200

  - name: Check if ECUBE database is already provisioned
    uri:
      url: "{{ ecube_setup_base_url }}/setup/database/provision-status"
      validate_certs: false
      status_code: 200
    register: _provision_status

  - name: Provision ECUBE database via setup API
    when:
      - run_setup_wizard | bool
      - not _provision_status.json.provisioned
    uri:
      url: "{{ ecube_setup_base_url }}/setup/database/provision"
      method: POST
      validate_certs: false
      body_format: json
      body:
        host: "{{ postgres_host }}"
        port: "{{ postgres_port }}"
        admin_username: "{{ postgres_admin_username }}"
        admin_password: "{{ postgres_admin_password }}"
        app_database: "{{ postgres_db }}"
        app_username: "{{ postgres_user }}"
        app_password: "{{ postgres_password }}"
      status_code: 200
    register: _database_provision_result

  - name: Re-check if ECUBE is already initialized
    uri:
      url: "{{ ecube_setup_base_url }}/setup/status"
      validate_certs: false
      status_code: 200
    register: _setup_status_after_provision

  - name: Run first-run initialization via setup API
    when:
      - run_setup_wizard | bool
      - not _setup_status_after_provision.json.initialized
    uri:
      url: "{{ ecube_setup_base_url }}/setup/initialize"
      method: POST
      validate_certs: false
      body_format: json
      body:
        username: "{{ ecube_admin_username }}"
        password: "{{ ecube_admin_password }}"
        trust_proxy_headers: "{{ ecube_trust_proxy_headers }}"
      status_code: 200
    register: _setup_result

  - name: Show database provision result
    when:
      - run_setup_wizard | bool
      - _database_provision_result is defined
    debug:
      var: _database_provision_result.json

  - name: Show setup initialization result
    when:
      - run_setup_wizard | bool
      - _setup_result is defined
    debug:
      var: _setup_result.json

  - name: Remove ECUBE downloaded package artifacts
    when: ecube_setup_cleanup_downloads | bool
    file:
      path: "{{ item }}"
      state: absent
    loop:
      - "{{ ecube_setup_download_dir }}"
      - "{{ ecube_setup_extract_dir }}"
